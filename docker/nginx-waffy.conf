# Example nginx config with waffy
#
# This config demonstrates all waffy directives.
# Copy and adapt for your application.

# JSON access log for learning engine
log_format waffy_learn escape=json
    '{"method":"$request_method",'
    '"uri":"$uri",'
    '"args":"$args",'
    '"content_type":"$content_type",'
    '"body":"$request_body",'
    '"status":$status,'
    '"headers":{"host":"$host","authorization":"$http_authorization","cookie":"$http_cookie"}}';

server {
    listen 80;
    server_name _;

    # Global waffy settings
    waffy_rules /var/waffy/rules.bin;

    # Learning log (write all requests for waffy-learn)
    access_log /var/log/nginx/waffy_learn.log waffy_learn;

    # API endpoint — strict whitelist enforcement
    location /api/v1/users {
        waffy on;
        waffy_mode enforce;        # enforce | detect | learn
        waffy_body_parser json;
        waffy_max_body_size 16k;
        waffy_on_violation 403;

        proxy_pass http://upstream:5678;
    }

    # Search — with free-text field
    location /api/v1/search {
        waffy on;
        waffy_mode enforce;
        waffy_on_violation 403;

        proxy_pass http://upstream:5678;
    }

    # Static assets — no WAF
    location /static/ {
        waffy off;
        root /var/www;
    }

    # Health check — no WAF
    location /health {
        waffy off;
        return 200 '{"status":"healthy"}';
        add_header Content-Type application/json;
    }

    # Default — detection mode (log but don't block)
    location / {
        waffy on;
        waffy_mode detect;

        proxy_pass http://upstream:5678;
    }
}
