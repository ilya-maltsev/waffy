services:
  # ───── Test services ─────
  # Run: docker compose -f docker/docker-compose.yml --profile test up --build --abort-on-container-exit

  test-go:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-go
    profiles: ["test"]

  test-python:
    build:
      context: ..
      dockerfile: docker/Dockerfile.test-python
    profiles: ["test"]

  test-e2e:
    build:
      context: ..
      dockerfile: docker/Dockerfile.e2e
    profiles: ["test"]

  # ───── Runtime services ─────
  # Run: docker compose -f docker/docker-compose.yml --profile run up --build

  upstream:
    image: hashicorp/http-echo
    command: ["-text", '{"status": "ok"}']
    ports:
      - "5678:5678"
    profiles: ["run"]

  nginx:
    build:
      context: ..
      dockerfile: docker/Dockerfile.nginx
    ports:
      - "8080:80"
    volumes:
      - waffy-rules:/var/waffy
      - nginx-logs:/var/log/nginx
    depends_on:
      - upstream
    profiles: ["run"]

  learn:
    build:
      context: ..
      dockerfile: docker/Dockerfile.learn
    volumes:
      - waffy-rules:/var/waffy/profiles
      - nginx-logs:/var/log/nginx
    command: ["from-log", "/var/log/nginx/waffy_learn.log", "--output", "/var/waffy/profiles"]
    profiles: ["run"]

volumes:
  waffy-rules:
  nginx-logs:
